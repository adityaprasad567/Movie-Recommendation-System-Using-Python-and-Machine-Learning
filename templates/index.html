<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Header Styling */
        header {
            background: linear-gradient(90deg, #1c1c1c 0%, #2d2d44 100%);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(229, 9, 20, 0.3);
            flex-wrap: wrap;
            gap: 20px;
        }

        header h1 {
            color: #E50914;
            font-size: 2.2em;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(229, 9, 20, 0.5);
            letter-spacing: 1px;
        }

        .search-box {
            display: flex;
            gap: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        input[type="text"] {
            padding: 12px 20px;
            width: 280px;
            border: none;
            outline: none;
            border-radius: 8px 0 0 8px;
            font-size: 16px;
            background: #f5f5f5;
            color: #333;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            box-shadow: inset 0 0 5px rgba(229, 9, 20, 0.3);
            background: #ffffff;
        }

        input[type="text"]::placeholder {
            color: #999;
        }

        button {
            padding: 12px 25px;
            border: none;
            background: linear-gradient(135deg, #E50914 0%, #c40812 100%);
            color: white;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #ff2e2e 0%, #E50914 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Movies Grid */
        .movies {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 50px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .movie-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            group: movie;
        }

        .movie-card:hover {
            transform: scale(1.12) translateY(-10px);
            box-shadow: 0 20px 50px rgba(229, 9, 20, 0.5);
        }

        .movie-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            transition: filter 0.4s ease;
        }

        .movie-card:hover img {
            filter: brightness(1.1) saturate(1.2);
        }

        .movie-title {
            text-align: center;
            margin-top: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #e0e0e0;
            transition: color 0.3s ease;
            line-height: 1.4;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .movie-card:hover .movie-title {
            color: #E50914;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1c1c1c 0%, #2d2d44 100%);
            padding: 40px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(229, 9, 20, 0.4);
            animation: slideUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .modal img {
            width: 220px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-right: 30px;
            float: left;
        }

        .modal h2 {
            color: #E50914;
            font-size: 2em;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(229, 9, 20, 0.3);
        }

        .modal p {
            margin: 12px 0;
            line-height: 1.8;
            color: #d0d0d0;
            font-size: 15px;
        }

        .modal p b {
            color: #E50914;
            font-weight: 700;
        }

        .modal-rating {
            font-size: 1.2em;
            color: #ffd700;
            margin: 15px 0;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            color: #E50914;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .close-btn:hover {
            color: #ff2e2e;
            background: rgba(229, 9, 20, 0.2);
            border-color: #E50914;
            transform: scale(1.2);
        }

        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #E50914;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px 20px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .search-box {
                width: 100%;
            }

            input[type="text"] {
                width: 100%;
                border-radius: 8px 0 0 8px;
            }

            .movies {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
                padding: 20px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal img {
                width: 100%;
                float: none;
                margin: 0 0 20px 0;
            }

            .movie-card:hover {
                transform: scale(1.08) translateY(-5px);
            }

            button {
                padding: 10px 20px;
                font-size: 14px;
            }

            input[type="text"] {
                padding: 10px 15px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.5em;
            }

            input[type="text"] {
                width: 100%;
            }

            .movies {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
                padding: 15px;
            }

            .modal-content {
                padding: 15px;
            }
        }

        /* No Results Message */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #888;
        }

        .no-results-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🎬 Movie Recommender</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search movies...">
        <button onclick="searchMovie()">Search</button>
    </div>
</header>

<div class="movies" id="results"></div>

<div class="modal" id="movieModal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close-btn" onclick="closeModal()">✖</span>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>

async function loadPopular() {
    showSpinner();
    try {
        let res = await fetch("/popular");
        let data = await res.json();
        displayMovies(data);
    } catch (error) {
        console.error("Error loading popular movies:", error);
        showNoResults();
    }
}

async function searchMovie() {
    let query = document.getElementById("searchInput").value.trim();
    if (!query) return;
    
    showSpinner();
    try {
        let res = await fetch(`/search?query=${encodeURIComponent(query)}`);
        let data = await res.json();
        if (data && data.length > 0) {
            displayMovies(data);
        } else {
            showNoResults("No movies found for your search.");
        }
    } catch (error) {
        console.error("Error searching movies:", error);
        showNoResults("Error performing search.");
    }
}

function displayMovies(movies) {
    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!movies || movies.length === 0) {
        showNoResults();
        return;
    }

    movies.forEach(movie => {
        if (movie.Poster && movie.Poster !== "N/A") {
            resultsDiv.innerHTML += `
                <div class="movie-card" onclick="loadDetails('${movie.imdbID}')">
                    <img src="${movie.Poster}" alt="${movie.Title}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                    <div class="movie-title">${movie.Title}</div>
                </div>
            `;
        }
    });
}

async function loadDetails(imdbID) {
    try {
        let res = await fetch(`/movie/${imdbID}`);
        let movie = await res.json();

        let modalBody = document.getElementById("modalBody");

        modalBody.innerHTML = `
            <img src="${movie.Poster}" alt="${movie.Title}">
            <h2>${movie.Title}</h2>
            <p><b>Year:</b> ${movie.Year || 'N/A'}</p>
            <p><b>Genre:</b> ${movie.Genre || 'N/A'}</p>
            <p><b>Director:</b> ${movie.Director || 'N/A'}</p>
            <p><b>Cast:</b> ${movie.Actors || 'N/A'}</p>
            <div class="modal-rating"><b>IMDB Rating:</b> ⭐ ${movie.imdbRating || 'N/A'} / 10</div>
            <p><b>Plot:</b></p>
            <p>${movie.Plot || 'No plot available.'}</p>
        `;

        document.getElementById("movieModal").classList.add("active");
    } catch (error) {
        console.error("Error loading movie details:", error);
    }
}

function closeModal() {
    document.getElementById("movieModal").classList.remove("active");
}

function showSpinner() {
    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = '<div class="spinner"></div>';
}

function showNoResults(message = "No movies available. Try searching for something!") {
    let resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = `
        <div class="no-results">
            <div class="no-results-icon">🎬</div>
            <p>${message}</p>
        </div>
    `;
}

// Allow Enter key to search
document.getElementById("searchInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        searchMovie();
    }
});

window.onload = loadPopular;

</script>

</body>
</html>
